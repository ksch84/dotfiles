[module/date]
type = internal/date
time = %H:%M
date = %a %d. %b 
format = <label>
label = %{T3}%date% %time% %{T-}
format-padding = 1
format-background = ${colors.bar}

[module/clock]
type = custom/text
content = %{T2}%{T-}
content-foreground = ${colors.icon}
content-background = ${colors.bar}
content-padding = 1

[module/bspwm]
type = internal/bspwm
pin-workspaces = true
format = %{T3}<label-state>%{T-}
format-background = ${colors.bar}
format-margin = 0
index-sort = true
enable-click = true
reverse-scroll = false
label-focused = %index% 
label-focused-padding = 1
label-focused-foreground = ${colors.focused}
label-focused-background = ${colors.window-active}
label-empty = %index%
label-empty-foreground = ${colors.empty}
label-empty-padding = 1
label-occupied = %index% 
label-occupied-foreground = ${colors.occupied}
label-occupied-padding = 1

[module/volume-slider]
type = custom/script
exec = ~/.config/polybar/scripts/volume-slider.sh
interval = 0.5
format-background = ${colors.bar}
format-padding = 1
click-left = pactl set-sink-volume @DEFAULT_SINK@ +5%
click-right = pactl set-sink-volume @DEFAULT_SINK@ -5%
scroll-up = pactl set-sink-volume @DEFAULT_SINK@ +1%
scroll-down = pactl set-sink-volume @DEFAULT_SINK@ -1%

[module/volume-mute]
type = custom/script
exec = ~/.config/polybar/scripts/volume-mute.sh
interval = 0.5
format-background = ${colors.bar}
format-padding = 1
click-left = ~/.config/polybar/scripts/volume-mute.sh --click
click-right = pavucontrol

[module/powermenu]
type = custom/text
click-left = rofi -show powermenu -modi powermenu:~/.config/rofi/rofi-power-menu
format-background = ${colors.bar}
format-padding = 1 
content = %{T1}%{T-}  

[module/tspace]
type = custom/text
content = " "
content-background = ${colors.background}
content-padding = 1

[module/monitor]
type = custom/text
content = %{T2}%{T-}
content-foreground = ${colors.icon}
content-background = ${colors.bar}
content-padding = 1
